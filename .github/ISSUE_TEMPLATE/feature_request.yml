name: Feature request
description: Suggest a new skill, extension, or repo improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the workflow gap or repeated pain point.
      placeholder: I often need a skill that can...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: Describe the desired skill, docs improvement, or repo enhancement.
      placeholder: A skill that...
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and constraints
      description: Mention triggers, guardrails, or platform requirements if you know them.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Share any workarounds or adjacent skills you already tried.
